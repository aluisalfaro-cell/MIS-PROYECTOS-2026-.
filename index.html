<html>
    <head>
        <style>
            *{
                margin:0px;
                padding: 0px;
            }
            body{
                background-color: black;
            }
            .contenedor{
                width: 400;
                height: 700;
                background-color: yellow;
                position: relative;
                overflow: hidden;
                margin:0 auto;
            }

            .cuadrito1{
                height: 100px;
                width: 100px;
                background-color: red;
                position: absolute;
                left:100px;
                top:-100px;
                animation: cuadrito1 4s infinite forwards 1s;
            }
            @keyframes cuadrito1{
                0%{
                    top:-100px;
                }
                50%{
                    top:200px;
                    rotate:-10deg;
                }
                55%{
                    top:180px;
                }
                80%{
                    top:200px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }

            .cuadrito2{
                height: 100px;
                width: 100px;
                background-color: red;
                position: absolute;
                left:50px;
                top:-100px;
                animation: cuadrito2 4s infinite forwards 1s;
            }
            @keyframes cuadrito2{
                0%{
                    top:-100px;
                }
                50%{
                    top:400px;
                    rotate: 10deg;
                }
                55%{
                    top:450px;
                }
                80%{
                    top:480px;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="cuadrito1"></div>            
            <div class="cuadrito2"></div>            
            <div class="cuadrito3"></div>            
            <div class="cuadrito4"></div>            
        </div>
    </body>
</html>
